[general]
framerate = 60
bars = 24
bar_width = 1
bar_spacing = 0
autosens = 1
lower_cutoff_freq = 50
higher_cutoff_freq = 10000

[input]
method = pipewire
source = auto

[output]
method = sdl_glsl
sdl_width = 220
sdl_height = 40
vertex_shader = pass_through.vert
fragment_shader = bar_spectrum.frag
continuous_rendering = 1

[color]
background = '#33333f'
gradient = 1
gradient_color_1 = '#66b044'
gradient_color_2 = '#8dc553'
gradient_color_3 = '#c4d96f'
gradient_color_4 = '#f0c674'
gradient_color_5 = '#d89a43'

[smoothing]
noise_reduction = 70
